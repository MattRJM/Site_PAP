<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email de Recuperação Enviado — Votação Escolar</title>
  <link rel="icon" href="img/transferir.png" type="image/png">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css?v=1.0.1">

<body class="d-flex align-items-center justify-content-center vh-100">
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }
  </script>

  <div class="login-card p-4 rounded-4 shadow-lg text-center" style="max-width: 420px; width: 90%;">
    <h3 class="text-success mb-3">Email Enviado!</h3>
    <p class="mb-3">
      Verifique sua caixa de entrada e siga as instruções para redefinir sua senha.
    </p>

    <i class="fa-solid fa-envelope-circle-check fa-3x text-success mb-3"></i>

    <a href="Login.html" class="btn btn-primary w-100">Voltar ao Login</a>
  </div>

</html>
